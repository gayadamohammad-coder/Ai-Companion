<!DOCTYPE html>
<html>
<head>
    <title>AI Companion - Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <div class="sidebar">
        <h2 id="logo">AI Companion</h2>
        <p class="menu-item"><a href="/">Dashboard</a></p>
        <p class="menu-item"><a href="/chat">Chat</a></p>
    </div>

    <div class="main">
        <div class="chat-container">
           <div class="chat-box" id="chatBox">
    {% for msg in history %}
        <div class="message {{ 'user-message' if msg[0] == 'user' else 'ai-message' }}">
            <strong>{{ 'You' if msg[0] == 'user' else 'Jarvis' }}:</strong> {{ msg[1] }}
        </div>
    {% endfor %}
</div> 

           <div class="chat-input-area">
    <textarea id="userInput" placeholder="Talk to Jarvis or paste code..." rows="3"></textarea>
    <button id="codeModeBtn" onclick="toggleCodeMode()">&lt;/&gt;</button>
    <button onclick="sendMessage()">Send</button>
</div>
        </div>
    </div>

</div>

<script>
    let history = [];


    let codeMode = false;

function toggleCodeMode() {
    codeMode = !codeMode;
    const input = document.getElementById("userInput");
    const btn = document.getElementById("codeModeBtn");

    if (codeMode) {
        input.placeholder = "Paste your code here...";
        btn.classList.add("active");
    } else {
        input.placeholder = "Talk to Jarvis...";
        btn.classList.remove("active");
    }
}

document.getElementById("userInput").addEventListener("keydown", function(e) {
    if (e.key === "Tab") {
        e.preventDefault();
        const start = this.selectionStart;
        const end = this.selectionEnd;
        this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
        this.selectionStart = this.selectionEnd = start + 4;
    }
});

    async function sendMessage() {
        const input = document.getElementById("userInput");
        const message = input.value.trim();
        const finalMessage = codeMode 
        ? `Please review this code:\n\n${message}` 
        : message;
        if (!message) return;

        appendMessage("You", message);
        input.value = "";

        const thinking = appendMessage("Jarvis", "Thinking...");

        const response = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: finalMessage, history: history })
        });

        const data = await response.json();
        history = data.history;
        thinking.innerHTML = `<strong>Jarvis:</strong> ${data.reply}`;
    }

    function appendMessage(sender, text) {
        const box = document.getElementById("chatBox");
        const div = document.createElement("div");
        div.classList.add("message", sender === "You" ? "user-message" : "ai-message");
        div.innerHTML = `<strong>${sender}:</strong> ${text}`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
        return div;
    }

    document.getElementById("userInput").addEventListener("keypress", function(e) {
        if (e.key === "Enter") sendMessage();
    });
</script>

</body>
</html>
