<!DOCTYPE html>
<html>
<head>
    <link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#7c3aed">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Companion - Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
</head>
<body>

<div class="container">

    <div class="sidebar">
        <h2 id="logo">AI Companion</h2>
        <p class="menu-item"><a href="/">Dashboard</a></p>
        <p class="menu-item"><a href="/chat">Chat</a></p>
        <p class="menu-item"><a href="/study">Study</a></p>
        <p class="menu-item"><a href="/logout">Logout</a></p>
    </div>

    <div class="main">
        <div class="chat-container">
           <div class="chat-box" id="chatBox">
    {% for msg in history %}
        <div class="message {{ 'user-message' if msg[0] == 'user' else 'ai-message' }}">
            <strong>{{ 'You' if msg[0] == 'user' else 'Jarvis' }}:</strong> {{ msg[1] }}
        </div>
    {% endfor %}
</div>

<div class="chat-input-area">
    <textarea id="userInput" placeholder="Talk to Jarvis or paste code..." rows="3"></textarea>

    <div id="codeModalOverlay" class="code-modal-overlay" style="display:none;">
        <div class="code-modal">
            <div class="code-modal-header">
                <span>Code editor</span>
                <button onclick="closeCodeModal()">✕</button>
            </div>
            <div id="editorContainer"></div>
            <div class="code-modal-footer">
                <button onclick="sendCode()">Send to Jarvis</button>
            </div>
        </div>
    </div>

    <button id="codeModeBtn" onclick="toggleCodeMode()">&lt;/&gt;</button>
    <button onclick="sendMessage()">Send</button>
<button id="micBtn" onclick="startVoice()">🎤</button>
    <button id="stopBtn" onclick="stopJarvis()" style="display:none;">Stop</button>
    <input type="file" id="fileInput" accept=".py,.html,.css,.js" style="display:none;" onchange="handleFileUpload(event)">
    <button onclick="document.getElementById('fileInput').click()">📁</button>
</div>

<div class="status-bar">
    <span><span class="hint">enter</span> send · <span class="hint">shift+enter</span> new line</span>
    <span>qwen2.5:1.5b</span>
</div>
        </div>
    </div>
    
</div>

<script>
    const JARVIS_KEY = "{{ api_key }}";
    let history = [];
    let codeMode = false;
    let pendingFile = null;
    let editor = null;
    let currentController = null;

    function toggleCodeMode() {
        const overlay = document.getElementById("codeModalOverlay");
        overlay.style.display = "flex";

        if (!editor) {
            editor = CodeMirror(document.getElementById("editorContainer"), {
                mode: "python",
                theme: "dracula",
                lineNumbers: true,
                indentUnit: 4,
                value: ""
            });
        }
        setTimeout(() => editor.refresh(), 10);
        editor.focus();
    }

    function closeCodeModal() {
        document.getElementById("codeModalOverlay").style.display = "none";
    }

    async function sendCode() {
        const code = editor.getValue().trim();
        if (!code) return;

        const finalMessage = `Please review this code:\n\n${code}`;
        appendMessage("You", code);
        editor.setValue("");
        closeCodeModal();

        const thinking = appendMessage("Jarvis", "Thinking...");

        const response = await fetch("/api/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-API-Key": JARVIS_KEY
            },
            body: JSON.stringify({ message: finalMessage, history: history })
        });

        const data = await response.json();
        history = data.history;
        thinking.innerHTML = `<strong>Jarvis:</strong> ${data.reply}`;
    }

    async function sendMessage() {
        const input = document.getElementById("userInput");
        const message = input.value.trim();

        let finalMessage = message;
        if (pendingFile) {
            finalMessage = `Here is my file "${pendingFile.name}":\n\n${pendingFile.content}\n\n${message}`;
            pendingFile = null;
            input.placeholder = "Talk to Jarvis or paste code...";
        }

        if (!message) return;

        appendMessage("You", message);
        input.value = "";

        const thinking = appendMessage("Jarvis", "Thinking...");
        showStopButton();

        currentController = new AbortController();

        try {
            const response = await fetch("/api/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-API-Key": JARVIS_KEY
                },
                body: JSON.stringify({ message: finalMessage, history: history }),
                signal: currentController.signal
            });

            const data = await response.json();
            history = data.history;
            thinking.innerHTML = `<strong>Jarvis:</strong> ${data.reply}`;
        } catch (err) {
            if (err.name === "AbortError") {
                thinking.innerHTML = `<strong>Jarvis:</strong> (cancelled)`;
            } else {
                thinking.innerHTML = `<strong>Jarvis:</strong> Error occurred.`;
            }
        }

        hideStopButton();
    }

    function stopJarvis() {
        if (currentController) {
            currentController.abort();
        }
    }

    function showStopButton() {
        document.getElementById("stopBtn").style.display = "inline-block";
    }

    function hideStopButton() {
        document.getElementById("stopBtn").style.display = "none";
    }

    function appendMessage(sender, text) {
        const box = document.getElementById("chatBox");
        const div = document.createElement("div");
        div.classList.add("message", sender === "You" ? "user-message" : "ai-message");
        div.innerHTML = `<strong>${sender}:</strong> ${text}`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
        return div;
    }

    document.getElementById("userInput").addEventListener("keydown", function(e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    async function handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        const text = await file.text();
        pendingFile = { name: file.name, content: text };

        const input = document.getElementById("userInput");
        input.placeholder = `📁 ${file.name} attached — type your question...`;
        input.focus();
    }
    function startVoice() {
    const recognition = new webkitSpeechRecognition();
    recognition.lang = 'en-US';
    recognition.onstart = () => {
        document.getElementById('micBtn').textContent = '🔴';
    };
    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        document.getElementById('userInput').value = transcript;
        document.getElementById('micBtn').textContent = '🎤';
        sendMessage();
    };
    recognition.onerror = () => {
        document.getElementById('micBtn').textContent = '🎤';
    };
    recognition.start();
}
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js');
  }
</script>
</body>
</html>
