<!DOCTYPE html>
<html>
<head>
    <link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#7c3aed">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis — Study Mode</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.0/marked.min.js"></script>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <h2 id="logo">Jarvis</h2>
        <p class="menu-item"><a href="/">Dashboard</a></p>
        <p class="menu-item"><a href="/chat">Chat</a></p>
        <p class="menu-item"><a href="/study">Study</a></p>
        <p class="menu-item"><a href="/logout">Logout</a></p>
    </div>

    <div class="main">
        <div id="topic-select">
            <h1>What do you want to study today?</h1>
            <div class="topic-buttons">
                <button onclick="startSession('JavaScript')">JavaScript</button>
                <button onclick="startSession('Flask')">Flask</button>
                <button onclick="startSession('HTML & CSS')">HTML & CSS</button>
                <button onclick="startSession('Python')">Python</button>
            </div>
        </div>

        <div id="study-chat" style="display:none;">
            <h2 id="session-title"></h2>
            <div class="chat-box" id="studyBox"></div>
            <div class="chat-input-area">
                <textarea id="studyInput" placeholder="Type your answer..."></textarea>
                <button onclick="sendAnswer()">Send</button>
            </div>

            <div class="status-bar">
                <span><span class="hint">enter</span> send · <span class="hint">shift+enter</span> new line</span>
                <span>qwen2.5:1.5b</span>
            </div>
        </div>
    </div>
</div>

<script>
    const JARVIS_KEY = "{{ api_key }}";
    let studyHistory = [];
    let currentTopic = "";

    function appendStudyMessage(sender, text) {
        const box = document.getElementById("studyBox");
        const div = document.createElement("div");
        div.classList.add("message", sender === "You" ? "user-message" : "ai-message");
        const formattedText = sender === "Jarvis" ? marked.parse(text) : text;
        div.innerHTML = `<strong>${sender}:</strong> ${formattedText}`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
        return div;
    }

    async function startSession(topic) {
        currentTopic = topic;
        studyHistory = [];

        document.getElementById("topic-select").style.display = "none";
        document.getElementById("study-chat").style.display = "flex";
        document.getElementById("session-title").textContent = "Studying: " + topic;
        document.getElementById("studyBox").innerHTML = "";

        const thinking = appendStudyMessage("Jarvis", "Thinking...");

        const response = await fetch("/api/study", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-API-Key": JARVIS_KEY
            },
            body: JSON.stringify({ message: "Start teaching me " + topic, topic: topic, history: studyHistory })
        });

        const data = await response.json();
        studyHistory = data.history;
        thinking.innerHTML = `<strong>Jarvis:</strong> ${marked.parse(data.reply)}`;
    }

    async function sendAnswer() {
        const input = document.getElementById("studyInput");
        const message = input.value.trim();
        if (!message) return;

        appendStudyMessage("You", message);
        input.value = "";

        const thinking = appendStudyMessage("Jarvis", "Thinking...");

        const response = await fetch("/api/study", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-API-Key": JARVIS_KEY
            },
            body: JSON.stringify({ message: message, topic: currentTopic, history: studyHistory })
        });

        const data = await response.json();
        studyHistory = data.history;
        thinking.innerHTML = `<strong>Jarvis:</strong> ${marked.parse(data.reply)}`;
    }

    document.getElementById("studyInput").addEventListener("keydown", function(e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendAnswer();
        }
    });
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js');
  }
</script>
</body>
</html>
