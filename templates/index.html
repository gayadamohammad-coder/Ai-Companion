<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Companion</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <div class="sidebar">
    <h2 id="logo">AI Companion</h2>
    <p class="menu-item"><a href="/">Dashboard</a></p>
    <p class="menu-item"><a href="/chat">Chat</a></p>
    <p class="menu-item"><a href="/study">Study</a></p>
    <p class="menu-item"><a href="/logout">Logout</a></p>
</div>
    <div class="main">
        <h1>Welcome Mohammed</h1>

        <div class="cards">

    <div class="card">
    <h2>Goals</h2>
    {% for goal in goals %}
        <p>→ {{ goal[0] }}</p>
    {% else %}
        <p>No goals yet.</p>
    {% endfor %}
</div>

<div class="card">
    <h2>Profile</h2>

    <p>Age: 21</p>
    <p>Height: 183 cm</p>
    <p>Weight: 74 kg</p>
</div>

<div class="card">
    <h2>Roadmap</h2>

    <p>✓ Website</p>
    <p>→ Ollama Integration</p>
    <p>→ Code Teacher</p>
</div>

    </div>

</div>

</body>
</html>
